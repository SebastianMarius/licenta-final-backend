services:
  postgres:
      image: postgres:16-alpine
      container_name: rental-postgres
      restart: unless-stopped
      ports:
        - "5433:5432"   # 5433 on host if 5432 is already in use
      environment:
        POSTGRES_USER: rental
        POSTGRES_PASSWORD: rental_dev
        POSTGRES_DB: rental_db
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U rental -d rental_db"]
        interval: 5s
        timeout: 5s
        retries: 5
  app:
    build: .
    container_name: nest-dev
    ports:
      - "9000:3000"
    volumes:
      - .:/app:delegated
      - node_modules:/app/node_modules
      - ./chrome-profile:/app/chrome-profile
    environment:
      - DATABASE_URL=postgresql://rental:rental_dev@postgres:5432/rental_db
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - TS_NODE_DEV_POLL=true
      # Force file watcher to use polling (needed when code is bind-mounted in Docker on Mac/Windows)
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - CHROME_PROFILE_PATH=/app/chrome-profile 
    command: sh -c "npm install && npx prisma migrate deploy && npm run start:dev:docker"

volumes:
  node_modules:
  postgres_data:
  chrome_data: